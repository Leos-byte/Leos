name: GitHub Real Write Smoke

on:
  workflow_dispatch:
    inputs:
      test_repo:
        description: "Repository to test, owner/name"
        required: true
      base_branch:
        description: "Base branch"
        default: "main"
        required: true

jobs:
  gated-real-write:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout public Leos repository without credentials
        run: |
          git init .
          git remote add origin https://github.com/Leos-byte/Leos.git
          git fetch --depth 1 origin "$GITHUB_REF"
          git checkout --detach FETCH_HEAD

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run production GitHub real-write smoke
        env:
          LEOS_ENABLE_REAL_GITHUB_WRITES: "1"
          LEOS_GITHUB_TEST_REPO: ${{ inputs.test_repo }}
          LEOS_GITHUB_TEST_REPO_MUST_BE_DISPOSABLE: "1"
          LEOS_GITHUB_BASE_BRANCH: ${{ inputs.base_branch }}
          LEOS_GITHUB_WORK_BRANCH_PREFIX: "leos/"
          SMOKE_AUTH_ENV: "SMOKE_AUTH_VALUE"
          SMOKE_AUTH_VALUE: ${{ secrets.LEOS_GITHUB_TOKEN }}
          SMOKE_APPROVAL_ENV: "SMOKE_APPROVAL_VALUE"
          SMOKE_APPROVAL_VALUE: ${{ secrets.LEOS_APPROVAL_HMAC_SECRET }}
        run: python examples/github_rest_agent/run_production_github_smoke.py
