name: CI

on:
  push:
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy type check
        run: mypy src

      - name: Tests with coverage
        run: |
          coverage run -m unittest discover -s tests
          coverage report --fail-under=83

      - name: Bandit security scan
        run: bandit -r src

      - name: Safety evals
        run: leos eval --suite safety

      - name: Benchmarks
        run: make bench

      - name: Verify wheel install and CLI
        if: matrix.python-version == '3.12'
        run: make package-check

      - name: Check release proof
        if: github.ref == 'refs/heads/main'
        run: python scripts/check_release_proof.py

      - name: Check production readiness
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python scripts/download_smoke_evidence.py \
            --repo "${GITHUB_REPOSITORY}" \
            --sha "${GITHUB_SHA}" \
            --output docs/proofs/real_github_smoke_latest.json
          python scripts/check_production_readiness.py \
            --profile production_github_only \
            --require-smoke-evidence \
            --smoke-evidence-path docs/proofs/real_github_smoke_latest.json

      - name: Generate local proof documents
        run: python scripts/generate_proofs.py --output docs/proofs --allow-dirty

      - name: Scan artifacts for secret literals
        run: python scripts/scan_artifacts_for_secrets.py --root .

  integration:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      LEOS_TEST_POSTGRES_DSN: postgresql://postgres:postgres@localhost:5432/postgres

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package with optional backend extras
        run: pip install -e ".[dev,postgres,server,observability,keyring]"

      - name: Verify container runtime for sandbox tests
        run: podman info

      - name: Integration tests (real Postgres and container runtimes)
        run: |
          set -o pipefail
          python -m unittest discover -s tests -v 2>&1 | tee integration-tests.log

      - name: Report remaining skips
        if: always()
        run: |
          {
            echo "## Integration job skip report"
            echo ""
            echo "Every remaining skip must name the missing runtime it is gated on:"
            echo ""
            echo '```'
            grep "skipped" integration-tests.log | sed "s/ \\.\\.\\. skipped / => skipped: /" | sort || echo "(no skips)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Sandbox isolation smoke evidence
        env:
          LEOS_SANDBOX_SMOKE_EVIDENCE_OUT: ${{ runner.temp }}/sandbox_smoke_latest.json
        run: python scripts/sandbox_smoke.py

      - name: Queue concurrency smoke evidence
        env:
          LEOS_QUEUE_SMOKE_EVIDENCE_OUT: ${{ runner.temp }}/queue_smoke_latest.json
        run: python scripts/queue_smoke.py

      - name: Validate smoke evidence documents
        env:
          LEOS_SANDBOX_SMOKE_EVIDENCE_OUT: ${{ runner.temp }}/sandbox_smoke_latest.json
          LEOS_QUEUE_SMOKE_EVIDENCE_OUT: ${{ runner.temp }}/queue_smoke_latest.json
        run: |
          python - <<'EOF'
          import os
          from pathlib import Path

          from scripts.check_production_readiness import _queue_evidence_check, _sandbox_evidence_check

          head = os.environ["GITHUB_SHA"]
          for check, env_name in (
              (_sandbox_evidence_check, "LEOS_SANDBOX_SMOKE_EVIDENCE_OUT"),
              (_queue_evidence_check, "LEOS_QUEUE_SMOKE_EVIDENCE_OUT"),
          ):
              result = check(Path("."), Path(os.environ[env_name]), expected_head=head)
              print(result)
              if not result["ok"]:
                  raise SystemExit(1)
          EOF

      - name: Upload sandbox smoke evidence
        uses: actions/upload-artifact@v4
        with:
          name: production-sandbox-evidence-${{ github.sha }}
          path: ${{ runner.temp }}/sandbox_smoke_latest.json
          if-no-files-found: error
          retention-days: 14

      - name: Upload queue smoke evidence
        uses: actions/upload-artifact@v4
        with:
          name: production-queue-evidence-${{ github.sha }}
          path: ${{ runner.temp }}/queue_smoke_latest.json
          if-no-files-found: error
          retention-days: 14

  deploy-smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build server image
        run: docker build -t leos-server:ci .

      - name: Container refuses to start without an API key
        run: |
          set +e
          output=$(docker run --rm leos-server:ci --check 2>&1)
          code=$?
          set -e
          echo "$output"
          test "$code" -ne 0
          echo "$output" | grep -q "LEOS_SERVER_API_KEY"

      - name: Healthz responds and endpoints require the API key
        run: |
          KEY=$(python -c "import secrets; print(secrets.token_hex(32))")
          docker run -d --name leos-serve -p 127.0.0.1:8080:8080 \
            -e LEOS_SERVER_API_KEY="$KEY" leos-server:ci
          for i in $(seq 1 30); do
            curl -fsS http://127.0.0.1:8080/healthz >/dev/null 2>&1 && break
            sleep 1
          done
          test "$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8080/healthz)" = "200"
          test "$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8080/readyz)" = "200"
          test "$(curl -s -o /dev/null -w '%{http_code}' -X POST http://127.0.0.1:8080/plans \
            -H 'content-type: application/json' -d '{}')" = "401"
          docker logs leos-serve
          docker rm -f leos-serve
