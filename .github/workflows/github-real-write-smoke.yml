name: GitHub Real Write Smoke

on:
  workflow_dispatch:
    inputs:
      test_repo:
        description: "Private disposable repository, owner/name"
        required: true
      base_branch:
        description: "Base branch"
        default: "main"
        required: true

permissions:
  contents: read

jobs:
  gated-real-write:
    runs-on: ubuntu-latest
    environment: smoke-private
    steps:
      - name: Checkout public Leos repository without credentials
        run: |
          git init .
          git remote add origin https://github.com/Leos-byte/Leos.git
          git fetch --depth 1 origin "$GITHUB_REF"
          git checkout --detach FETCH_HEAD

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run production GitHub real-write smoke
        env:
          LEOS_ENABLE_REAL_GITHUB_WRITES: "1"
          LEOS_GITHUB_SMOKE_CLEANUP: "1"
          LEOS_GITHUB_TEST_REPO: ${{ inputs.test_repo }}
          LEOS_GITHUB_TEST_REPO_MUST_BE_DISPOSABLE: "1"
          LEOS_GITHUB_BASE_BRANCH: ${{ inputs.base_branch }}
          LEOS_GITHUB_WORK_BRANCH_PREFIX: "leos/"
          LEOS_SMOKE_EVIDENCE_OUT: ${{ runner.temp }}/real_github_smoke_latest.json
          SMOKE_AUTH_ENV: "SMOKE_AUTH_VALUE"
          SMOKE_AUTH_VALUE: ${{ secrets.LEOS_SMOKE_GITHUB_TOKEN }}
          SMOKE_APPROVAL_ENV: "SMOKE_APPROVAL_VALUE"
          SMOKE_APPROVAL_VALUE: ${{ secrets.LEOS_SMOKE_APPROVAL_HMAC_SECRET }}
        run: python examples/github_rest_agent/run_production_github_smoke.py

      - name: Validate sanitized smoke evidence
        if: always()
        run: |
          python scripts/check_production_readiness.py \
            --profile production_github_only \
            --require-smoke-evidence \
            --smoke-evidence-path "${RUNNER_TEMP}/real_github_smoke_latest.json"
          python scripts/scan_artifacts_for_secrets.py --root "${RUNNER_TEMP}"

      - name: Upload sanitized exact-HEAD smoke evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-smoke-evidence-${{ github.sha }}
          path: ${{ runner.temp }}/real_github_smoke_latest.json
          if-no-files-found: error
          retention-days: 14
